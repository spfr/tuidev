name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Shellcheck — every shell file under our control.
  # ---------------------------------------------------------------------------
  lint-scripts:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: lint
        run: |
          shellcheck \
            install.sh uninstall.sh \
            scripts/*.sh \
            scripts/lib/*.sh \
            scripts/tmux/layout-*.sh \
            scripts/install/*.sh \
            scripts/install/packs/*.sh \
            bin/sbx

  # ---------------------------------------------------------------------------
  # Parse-only checks for scripts: bash -n across the tree.
  # ---------------------------------------------------------------------------
  script-syntax:
    name: bash -n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: parse shell scripts
        run: |
          fail=0
          while IFS= read -r -d '' script; do
            bash -n "$script" || { echo "✗ $script"; fail=1; }
          done < <(find install.sh uninstall.sh scripts bin -name '*.sh' -type f -print0 2>/dev/null; printf '\0%s\0' bin/sbx)
          exit $fail

  # ---------------------------------------------------------------------------
  # Config file validation: JSON, TOML, KDL presence, Lua parse.
  # ---------------------------------------------------------------------------
  validate-configs:
    name: validate configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install validators
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 lua5.4 jq
      - name: validate JSON
        run: |
          for f in configs/claude/settings.json configs/opencode/opencode.json; do
            [[ -f "$f" ]] && jq empty "$f" && echo "✓ $f"
          done
      - name: validate TOML
        run: |
          for f in configs/starship/starship.toml configs/codex/config.toml; do
            if [[ -f "$f" ]]; then
              python3 -c "import tomllib; tomllib.load(open('$f','rb'))" && echo "✓ $f"
            fi
          done
      - name: validate Lua
        run: |
          for f in $(find configs/nvim configs/hammerspoon -name '*.lua' 2>/dev/null); do
            lua5.4 -e "loadfile('$f')" && echo "✓ $f"
          done

  # ---------------------------------------------------------------------------
  # No hardcoded user paths leaked into shipped configs or scripts.
  # ---------------------------------------------------------------------------
  check-paths:
    name: no hardcoded paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: grep for /Users/NAME and /home/NAME
        run: |
          if grep -rE '/Users/[a-zA-Z0-9_-]+/' configs/ scripts/ install.sh 2>/dev/null | grep -v '.git'; then
            echo "✗ hardcoded /Users/USER path found"
            exit 1
          fi
          if grep -rE '/home/[a-zA-Z0-9_-]+/' configs/ scripts/ install.sh 2>/dev/null \
             | grep -v '.git' | grep -v 'testuser'; then
            echo "✗ hardcoded /home/USER path found"
            exit 1
          fi
          echo "✓ clean"

  # ---------------------------------------------------------------------------
  # Config-file presence: the files install.sh references must exist.
  # Zellij layouts are NOT required here — they're in the opt-in zellij pack.
  # ---------------------------------------------------------------------------
  required-files:
    name: required files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          required=(
            install.sh
            Makefile
            configs/zsh/.zshrc
            configs/starship/starship.toml
            configs/tmux/tmux.conf
            configs/ghostty/config
            configs/ssh/config
            configs/claude/settings.json
            configs/codex/config.toml
            configs/sandbox/profiles/strict.sb
            configs/sandbox/profiles/standard.sb
            configs/sandbox/profiles/off.sb
            bin/sbx
            scripts/lib/ui.sh
            scripts/lib/config_write.sh
            scripts/notify.sh
            scripts/health_check.sh
            scripts/test_suite.sh
            scripts/update.sh
            docs/sandboxing.md
            docs/profiles.md
            docs/remote.md
            docs/migration.md
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ -e "$f" ]]; then
              echo "✓ $f"
            else
              echo "✗ $f  (missing)"
              missing=1
            fi
          done
          exit $missing

  # ---------------------------------------------------------------------------
  # Seatbelt profiles parse on the macOS runner.
  # ---------------------------------------------------------------------------
  seatbelt-profiles:
    name: seatbelt profiles parse (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: parse each .sb
        run: |
          for p in configs/sandbox/profiles/*.sb; do
            # -n = dry-run: load + validate + exit without executing.
            sandbox-exec -n "$(basename "$p" .sb)" -f "$p" -D HOME_DIR="$HOME" -D PROJECT_DIR="$PWD" \
              /usr/bin/true && echo "✓ $p"
          done
      - name: smoke-test sbx wrapper
        run: |
          chmod +x bin/sbx
          ./bin/sbx --help | head -5
          ./bin/sbx --dry-run -- echo hello
          echo "✓ sbx executes"

  # ---------------------------------------------------------------------------
  # scripts/lib/ unit tests + cross-file contract checks.
  # ---------------------------------------------------------------------------
  lib-tests:
    name: scripts/lib tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/lib/test_config_write.sh
      - run: bash scripts/lib/test_profile.sh
      - run: bash scripts/lib/test_contract.sh

  # ---------------------------------------------------------------------------
  # Docker Ubuntu smoke test for the core pack. UI tests are skipped here.
  # ---------------------------------------------------------------------------
  docker-core:
    name: docker core-tag test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build
        run: docker build -t mactui-test .
      - name: run core tests
        run: docker run --rm mactui-test bash -c "./scripts/test_suite.sh --tag core"
      - name: cleanup
        if: always()
        run: docker rmi mactui-test || true

  # ---------------------------------------------------------------------------
  # Doc link + presence check.
  # ---------------------------------------------------------------------------
  check-docs:
    name: documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: referenced docs exist
        run: |
          missing=0
          for f in $(grep -oE '\(docs/[^)]+\)' README.md 2>/dev/null | tr -d '()' | sort -u); do
            if [[ -f "$f" ]]; then
              echo "✓ $f"
            else
              echo "✗ $f  (referenced but missing)"
              missing=1
            fi
          done
          exit $missing

  # ---------------------------------------------------------------------------
  # Aggregate result.
  # ---------------------------------------------------------------------------
  summary:
    name: summary
    runs-on: ubuntu-latest
    needs:
      - lint-scripts
      - script-syntax
      - validate-configs
      - check-paths
      - required-files
      - seatbelt-profiles
      - lib-tests
      - docker-core
      - check-docs
    if: always()
    steps:
      - run: |
          echo "All CI checks completed. See per-job results above."
